<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coup · 政變 — 人機對戰</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Coup <span>政變</span></h1>
      <div id="setup">
        <label>人數
          <select id="numPlayers">
            <option value="2">2 人</option>
            <option value="3">3 人</option>
            <option value="4" selected>4 人</option>
            <option value="5">5 人</option>
            <option value="6">6 人</option>
          </select>
        </label>
        <label>AI 難度
          <select id="difficulty">
            <option value="easy">簡單</option>
            <option value="normal" selected>普通</option>
            <option value="hard">困難</option>
          </select>
        </label>
        <label>速度
          <select id="speed">
            <option value="fast">快</option>
            <option value="normal" selected>普通</option>
            <option value="slow">慢</option>
          </select>
        </label>
        <button id="newGame">開新局</button>
      </div>
    </header>

    <main>
      <section id="table">
        <div id="opponents"></div>
        <div id="center"></div>
        <div id="human"></div>
        <div id="prompt"></div>
      </section>

      <aside id="logPanel">
        <h3>行動日誌</h3>
        <div id="log"></div>
        <div class="legend">
          <h4>角色速查</h4>
          <ul>
            <li><b style="color:#e0498f">公爵 Duke</b>：課稅+3 / 擋外援</li>
            <li><b style="color:#bbb">刺客 Assassin</b>：付3 暗殺</li>
            <li><b style="color:#d4d63a">大使 Ambassador</b>：換牌 / 擋偷</li>
            <li><b style="color:#4a90d9">隊長 Captain</b>：偷2 / 擋偷</li>
            <li><b style="color:#e0544a">夫人 Contessa</b>：擋暗殺</li>
          </ul>
        </div>
      </aside>
    </main>

    <div id="overlay"></div>
  </div>

  <script src="js/engine.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
