<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coup · 政變 — 塔羅人機對戰</title>
  <meta name="theme-color" content="#0a0712" />
  <meta name="description" content="Coup 政變・古典塔羅牌風格・手機可玩・人類 vs AI" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23140d24'/%3E%3Crect x='3' y='3' width='58' height='58' rx='10' fill='none' stroke='%23c9a227' stroke-width='2'/%3E%3Ctext x='32' y='45' font-size='36' text-anchor='middle' fill='%23e8cf72'%3E%E2%99%94%3C/text%3E%3C/svg%3E" />
  <meta property="og:title" content="Coup · 政變 — 塔羅人機對戰" />
  <meta property="og:description" content="古典塔羅牌風格的 Coup 政變・手機可玩・人類 vs AI 對戰" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Coup 政變" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Coup <span>政變</span></h1>
      <div id="setup">
        <label>人數
          <select id="numPlayers">
            <option value="2">2 人</option>
            <option value="3">3 人</option>
            <option value="4" selected>4 人</option>
            <option value="5">5 人</option>
            <option value="6">6 人</option>
          </select>
        </label>
        <label>AI 難度
          <select id="difficulty">
            <option value="easy">簡單</option>
            <option value="normal" selected>普通</option>
            <option value="hard">困難</option>
          </select>
        </label>
        <label>速度
          <select id="speed">
            <option value="fast">快</option>
            <option value="normal" selected>普通</option>
            <option value="slow">慢</option>
          </select>
        </label>
        <button id="newGame">開新局</button>
      </div>
    </header>

    <div class="divider">✦ ❖ ✦ ❖ ✦</div>

    <main>
      <div id="board">
        <section id="table">
          <div id="opponents"></div>
          <div id="center"></div>
          <div id="human"></div>
        </section>
        <div id="prompt"></div>
      </div>

      <aside id="logPanel">
        <h3>行動日誌</h3>
        <div id="log"></div>
        <div class="legend">
          <h4>角色速查</h4>
          <ul>
            <li><b style="color:#e0498f">公爵 Duke</b>：課稅+3 / 擋外援</li>
            <li><b style="color:#bbb">刺客 Assassin</b>：付3 暗殺</li>
            <li><b style="color:#d4d63a">大使 Ambassador</b>：換牌 / 擋偷</li>
            <li><b style="color:#4a90d9">隊長 Captain</b>：偷2 / 擋偷</li>
            <li><b style="color:#e0544a">夫人 Contessa</b>：擋暗殺</li>
          </ul>
        </div>
      </aside>
    </main>

    <div id="overlay"></div>
  </div>

  <script src="js/engine.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
