name: Deploy Coup to GitHub Pages

on:
  # 設為手動觸發：避免在私有 repo（無法發佈 Pages）上每次 push 都失敗。
  # 一旦 repo 改為 Public（或啟用 Pages），即可在 Actions 頁面手動執行，或由我代為觸發。
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 只保留最新一次 Pages 部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site (web/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
