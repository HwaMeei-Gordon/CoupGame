name: Deploy Coup to GitHub Pages

on:
  push:
    branches: ["main", "claude/game-deep-research-lghzbr"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 只保留最新一次 Pages 部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site (web/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
